name: Container Keepalive

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: container-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Render Config
        env:
          SERVICE_HELENPAYNE261_SESSION_B64: ${{ secrets.SERVICE_HELENPAYNE261_SESSION_B64 }}
          SERVICE_LIMING737_SESSION_B64: ${{ secrets.SERVICE_LIMING737_SESSION_B64 }}
        run: |
          node ./scripts/render-config.mjs \
            --mode keepalive \
            --output ./config/accounts.json

      - name: Run Keepalive
        run: |
          node ./scripts/keepalive.mjs \
            --config ./config/accounts.json \
            --log-file ./keepalive.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-keepalive-${{ github.run_id }}
          path: ./keepalive.log
