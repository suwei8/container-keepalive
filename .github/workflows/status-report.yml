name: Daily Status Report

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: container-daily-status
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  status-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Render Config
        env:
          SERVICE_HELENPAYNE261_SESSION_B64: ${{ secrets.SERVICE_HELENPAYNE261_SESSION_B64 }}
          SERVICE_LIMING737_SESSION_B64: ${{ secrets.SERVICE_LIMING737_SESSION_B64 }}
          SERVICE_JIYUANLIHUIZI_SESSION_B64: ${{ secrets.SERVICE_JIYUANLIHUIZI_SESSION_B64 }}
        run: |
          node ./scripts/render-config.mjs \
            --mode status \
            --output ./config/accounts.json

      - name: Build Status Report
        run: |
          node ./scripts/status-report.mjs \
            --config ./config/accounts.json \
            --title "Ampere 账号状态日报" \
            --json-out ./daily-status.json \
            --text-out ./daily-status.txt

      - name: Send Telegram Status Report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node ./scripts/send-telegram.mjs --message-file ./daily-status.txt

      - name: Upload Status Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-daily-status-${{ github.run_id }}
          path: |
            ./daily-status.json
            ./daily-status.txt
